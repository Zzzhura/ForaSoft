# CI: линт + unit + integration на PR, сборка артефакта клиента (задача 25, TDD §12).
# E2E (Playwright) и сборка Docker-образа — отдельными job'ами, зависят от проверок.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Все команды — из каталога monorepo video-chat-room/.
defaults:
  run:
    working-directory: video-chat-room

jobs:
  # Линт, проверка формата, unit + integration тесты, сборка артефакта (задачи 21–23).
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: video-chat-room/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # `node --test` гоняет server/test/*: unit (RoomRegistry, validation)
      # и integration сокет-слоя (задачи 21, 23).
      - name: Server tests (unit + integration)
        run: npm run test --workspace server

      # Vitest: useLocalMedia, PeerConnectionManager, правило initiator (задача 22).
      - name: Client unit tests
        run: npm run test --workspace client

      - name: Build client
        run: npm run build

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: video-chat-room/client/dist
          retention-days: 7

  # E2E на собранном клиенте + сервере (задача 24). Fake-медиа Chromium.
  e2e:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: video-chat-room/package-lock.json

      - name: Install
        run: npm ci

      # Self-signed сертификат → сервер и Playwright webServer работают по HTTPS
      # (secure context для getUserMedia, baseURL https://localhost:3001).
      - name: Generate TLS cert
        run: npm run certs

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

  # Проверка, что Dockerfile собирается (один процесс: сервер + статика SPA).
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4

      # working-directory уже video-chat-room → контекст сборки = текущий каталог.
      - name: Build image
        run: docker build -t video-chat-room:ci .
