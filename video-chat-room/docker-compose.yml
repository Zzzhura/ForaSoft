# Прод-композиция: app (один процесс — сервер + статика SPA) за nginx-reverse-proxy,
# который терминирует TLS и проксирует WSS (TDD §12, задача 25).
#
# Запуск:
#   docker compose up --build
# Положите TLS-сертификат в ./deploy/certs/{fullchain,privkey}.pem и укажите домен
# в deploy/nginx.conf (server_name).

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # Браузер ходит на публичный origin (через nginx) — он же Origin для CORS
      # Socket.io. Замените на свой домен.
      CLIENT_ORIGIN: https://your-domain.example
      MAX_MEMBERS: 4
      CHAT_HISTORY_CAP: 200
      MESSAGE_MAX_LEN: 1000
    expose:
      - '3001'

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
