# Reverse-proxy: TLS-терминация + апгрейд WebSocket (WSS снаружи → ws внутрь).
# getUserMedia/WebRTC требуют secure context (TDD §10/§12), поэтому публичный
# вход — только HTTPS; сам app-контейнер слушает HTTP на 3001.
#
# Замените server_name и пути к сертификатам под свой домен (TLS — на усмотрение
# деплоя: Let's Encrypt/Caddy/корпоративный CA).

# app — имя сервиса из docker-compose.yml (DNS внутри сети compose).
upstream video_chat_app {
  server app:3001;
}

# HTTP → HTTPS редирект.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name your-domain.example;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  # Socket.io: сигналинг и чат поверх WebSocket — нужен Upgrade/Connection.
  location /socket.io/ {
    proxy_pass http://video_chat_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Долгоживущие WS-соединения не должны рваться по таймауту.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA + статика + /healthz.
  location / {
    proxy_pass http://video_chat_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
